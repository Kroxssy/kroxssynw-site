<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ekip - Kroxssy Network</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050814;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  position:fixed;
  width:100%;
  top:0;
  backdrop-filter:blur(10px);
}

.nav a{
  color:#aaa;
  margin-left:15px;
  text-decoration:none;
}

.nav a:hover{
  color:white;
}

/* CONTENT */
.container{
  padding:140px 20px;
  text-align:center;
}

.title{
  font-size:60px;
  color:#4df0ff;
  text-shadow:0 0 20px #4df0ff;
}

/* GRID */
.grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:40px;
}

/* CARD */
.card{
  width:240px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:15px;
  padding:25px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#4df0ff;
}

/* ROLE COLORS */
.owner{
  color:#ff4d6d;
  font-weight:bold;
}

.admin{
  color:#fbbf24;
  font-weight:bold;
}

.mod{
  color:#4df0ff;
  font-weight:bold;
}

.helper{
  color:#a78bfa;
  font-weight:bold;
}

/* AVATAR */
.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#1f2937;
  margin:0 auto 15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div>Kroxssy Network</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="server.html">Sunucu</a>
    <a href="rules.html">Kurallar</a>
    <a href="staff.html">Ekip</a>
    <a href="shop.html">Mağaza</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="title">Sunucu Ekibi</div>

  <div class="grid">

    <div class="card">
      <div class="avatar">👑</div>
      <div class="owner">Owner</div>
      Kroxssy
    </div>

    <div class="card">
      <div class="avatar">⚙️</div>
      <div class="admin">Admin</div>
      System Manager
    </div>

    <div class="card">
      <div class="avatar">🛡</div>
      <div class="mod">Moderatör</div>
      Player Support
    </div>

    <div class="card">
      <div class="avatar">💬</div>
      <div class="helper">Helper</div>
      Community Helper
    </div>

  </div>

</div>

</body>
</html>
