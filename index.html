<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(-45deg, #050816, #0a1a33, #0d0f2c, #120a2a);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 panel */
.panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 720px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    color: white;
}

.title {
    font-size: 52px;
    font-weight: bold;
    text-shadow: 0 0 20px #00aaff;
}

/* 🌐 IP */
.ip-box {
    margin-top: 12px;
    display: inline-flex;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    cursor: pointer;
}

/* 📊 status */
.status {
    margin-top: 10px;
    display: inline-block;
    padding: 5px 12px;
    border-radius: 50px;
    background: #00ff88;
    color: black;
    font-weight: bold;
}

/* 🎮 grid */
.grid {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

/* 🔘 buttons */
.btn {
    padding: 16px;
    border-radius: 14px;
    background: rgba(0,170,255,0.12);
    border: 1px solid rgba(0,170,255,0.25);
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-size: 15px;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ccff;
    background: rgba(0,170,255,0.3);
}

/* ✨ cosmetics highlight */
.cosmetics {
    background: rgba(255, 215, 0, 0.12);
    border: 1px solid rgba(255, 215, 0, 0.3);
}

.cosmetics:hover {
    box-shadow: 0 0 25px gold;
}
</style>
</head>

<body>

<div class="panel">

    <div class="title">Kroxssy Network</div>

    <div class="ip-box" onclick="copyIP()">
        🌐 kroxssynw.eu.org 📋
    </div>

    <div class="status">ONLINE</div>

    <div class="grid">

        <div class="btn" onclick="openPage('rules.html')">📜 Rules</div>
        <div class="btn" onclick="openPage('staff.html')">🛡️ Staff</div>
        <div class="btn" onclick="openPage('shop.html')">🛒 Shop</div>

        <div class="btn" onclick="openPage('server.html')">🌍 Server</div>
        <div class="btn" onclick="openPage('status.html')">📊 Status</div>

        <div class="btn cosmetics" onclick="openPage('cosmetics.html')">
            ✨ Cosmetics
        </div>

    </div>

</div>

<script>
function copyIP(){
    navigator.clipboard.writeText("kroxssynw.eu.org");
    alert("IP kopyalandı!");
}

function openPage(page){
    window.location.href = page;
}
</script>

</body>
</html>
