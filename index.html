<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1220, #050816);
}

/* 🌌 animated background */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("assets/bg.png") center/cover;
    opacity: 0.25;
    filter: blur(1px);
}

/* 🧊 main panel */
.panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 860px;
    padding: 45px;
    border-radius: 24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.10);
    text-align: center;
    color: white;
}

/* 🏷️ logo */
.logo {
    width: 110px;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 20px #00aaff);
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { filter: drop-shadow(0 0 10px #00aaff); }
    to { filter: drop-shadow(0 0 25px #00ffaa); }
}

/* 🏷️ title */
.title {
    font-size: 54px;
    font-weight: bold;
    text-shadow: 0 0 25px #00aaff;
}

/* 🌐 IP box */
.ip {
    margin-top: 14px;
    display: inline-block;
    padding: 12px 20px;
    border-radius: 12px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: 0.2s;
}

.ip:hover {
    transform: scale(1.06);
    box-shadow: 0 0 20px #00aaff;
}

.icon {
    width: 18px;
    vertical-align: middle;
    margin-right: 6px;
}

/* 📊 status */
.status {
    margin-top: 12px;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    font-size: 13px;
}

/* 🎮 grid */
.grid {
    margin-top: 34px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

/* 🔘 cards */
.card {
    display: block;
    padding: 18px;
    border-radius: 16px;
    background: rgba(0,170,255,0.08);
    border: 1px solid rgba(0,170,255,0.20);
    text-decoration: none;
    color: white;
    transition: 0.25s;
    text-align: left;
}

.card:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 0 25px rgba(0,170,255,0.5);
    background: rgba(0,170,255,0.18);
}

.card h3 {
    margin: 0;
    font-size: 18px;
}

.card p {
    margin: 6px 0 0;
    font-size: 13px;
    opacity: 0.75;
}

.card-icon {
    width: 22px;
    vertical-align: middle;
    margin-right: 6px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="panel">

    <!-- 🖼️ LOGO PNG -->
    <img src="assets/logo.png" class="logo">

    <div class="title">Kroxssy Network</div>

    <!-- 🌐 IP -->
    <div class="ip" onclick="copyIP()">
        <img src="assets/ip.png" class="icon">
        gas-whale.gl.joinmc.link 📋
    </div>

    <!-- 📊 STATUS -->
    <div class="status">
        <img src="assets/status.png" class="icon">
        SUNUCU AKTİF
    </div>

    <!-- 🎮 CARDS -->
    <div class="grid">

        <a class="card" href="./rules.html">
            <h3><img src="assets/rules.png" class="card-icon">Kurallar</h3>
            <p>Sunucu kurallarını incele</p>
        </a>

        <a class="card" href="./staff.html">
            <h3><img src="assets/staff.png" class="card-icon">Yetkililer</h3>
            <p>Ekip ve yönetim kadrosu</p>
        </a>

        <a class="card" href="./shop.html">
            <h3><img src="assets/shop.png" class="card-icon">Market</h3>
            <p>Paketler ve satın alımlar</p>
        </a>

        <a class="card" href="./server.html">
            <h3><img src="assets/server.png" class="card-icon">Sunucu</h3>
            <p>Oyun modları ve bilgiler</p>
        </a>

        <a class="card" href="./status.html">
            <h3><img src="assets/status_page.png" class="card-icon">Durum</h3>
            <p>Online oyuncular</p>
        </a>

    </div>

</div>

<script>
function copyIP(){
    navigator.clipboard.writeText("gas-whale.gl.joinmc.link");
    alert("IP kopyalandı!");
}
</script>

</body>
</html>
