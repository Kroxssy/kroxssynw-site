<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050814;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  position:fixed;
  width:100%;
  top:0;
  backdrop-filter:blur(10px);
}

.nav a{
  color:#aaa;
  margin-left:20px;
  text-decoration:none;
}

.nav a:hover{color:white}

/* HERO */
.hero{
  text-align:center;
  padding:200px 20px 100px;
}

.title{
  font-size:80px;
  color:#4df0ff;
  text-shadow:0 0 30px #4df0ff;
}

.subtitle{
  color:#bbb;
  margin-top:10px;
}

/* GRID MENU */
.grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:60px 20px;
}

.card{
  width:220px;
  padding:25px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#4df0ff;
}

/* IP */
.ip{
  margin-top:30px;
  display:inline-block;
  padding:15px 25px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:10px;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:#666;
}
</style>
</head>

<body>

<div class="nav">
  <div>Kroxssy Network</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="server.html">Sunucu</a>
    <a href="rules.html">Kurallar</a>
    <a href="staff.html">Ekip</a>
    <a href="shop.html">Mağaza</a>
  </div>
</div>

<div class="hero">
  <div class="title">Kroxssy Network</div>
  <div class="subtitle">Dev Minecraft Network Platformu</div>

  <div class="ip" onclick="copyIP()">
    IP: oyna.kroxssynw.eu.org
  </div>
</div>

<div class="grid">

  <div class="card" onclick="location.href='server.html'">
    🌍 Sunucu<br>Detaylar
  </div>

  <div class="card" onclick="location.href='rules.html'">
    📜 Kurallar<br>Okumadan girme
  </div>

  <div class="card" onclick="location.href='staff.html'">
    🛡 Ekip<br>Yönetim
  </div>

  <div class="card" onclick="location.href='shop.html'">
    💎 Mağaza<br>Kozmetikler
  </div>

</div>

<footer>
© 2026 Kroxssy Network
</footer>

<script>
function copyIP(){
  navigator.clipboard.writeText("oyna.kroxssynw.eu.org");
  alert("IP kopyalandı!");
}
</script>

</body>
</html>
