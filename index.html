<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1220, #050816);
}

/* 🌫️ background glow */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(-45deg, #0a1a33, #050816, #0d0f2c);
    opacity: 0.85;
}

/* 🧊 main panel */
.panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 820px;
    padding: 40px;
    border-radius: 24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.10);
    text-align: center;
    color: white;
}

/* 🏷️ title */
.title {
    font-size: 56px;
    font-weight: bold;
    text-shadow: 0 0 25px #00aaff;
}

/* 🌐 ip box */
.ip {
    margin-top: 14px;
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: 0.2s;
}

.ip:hover {
    transform: scale(1.05);
    box-shadow: 0 0 18px #00aaff;
}

/* 📊 status */
.status {
    margin-top: 12px;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    font-size: 13px;
}

/* 🎮 grid */
.grid {
    margin-top: 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

/* 🔘 cards */
.card {
    display: block;
    padding: 18px;
    border-radius: 16px;
    background: rgba(0,170,255,0.08);
    border: 1px solid rgba(0,170,255,0.20);
    text-decoration: none;
    color: white;
    transition: 0.25s;
    text-align: left;
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 0 25px rgba(0,170,255,0.4);
    background: rgba(0,170,255,0.18);
}

.card h3 {
    margin: 0;
    font-size: 18px;
}

.card p {
    margin: 6px 0 0;
    font-size: 13px;
    opacity: 0.75;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="panel">

    <div class="title">Kroxssy Network</div>

    <div class="ip" onclick="copyIP()">
        🌐 links-heavy.gl.joinmc.link 📋
    </div>

    <div class="status">SUNUCU AKTİF</div>

    <div class="grid">

        <a class="card" href="./rules.html">
            <h3>📜 Kurallar</h3>
            <p>Sunucu kurallarını incele</p>
        </a>

        <a class="card" href="./staff.html">
            <h3>🛡️ Yetkililer</h3>
            <p>Ekip ve yönetim kadrosu</p>
        </a>

        <a class="card" href="./shop.html">
            <h3>🛒 Market</h3>
            <p>Satın alma ve paketler</p>
        </a>

        <a class="card" href="./server.html">
            <h3>🌍 Sunucu</h3>
            <p>Oyun modları ve bilgiler</p>
        </a>

        <a class="card" href="./status.html">
            <h3>📊 Durum</h3>
            <p>Online oyuncular ve durum</p>
        </a>

    </div>

</div>

<script>
function copyIP(){
    navigator.clipboard.writeText("links-heavy.gl.joinmc.link");
    alert("IP kopyalandı!");
}
</script>

</body>
</html>
