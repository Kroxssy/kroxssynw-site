<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Server Lobby</title>

<style>
/* 🌌 Background */
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #0a0f2c, #1b1f3a, #0f1b2d, #1a1033);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}

/* 🌊 Animated background */
@keyframes bgMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ✨ Center container */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
}

/* 🏷️ Title animation */
.title {
    font-size: 60px;
    font-weight: bold;
    text-shadow: 0 0 20px #00aaff;
    animation: popIn 1.2s ease-out, glow 2s infinite alternate;
}

@keyframes popIn {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

@keyframes glow {
    from {text-shadow: 0 0 10px #00aaff;}
    to {text-shadow: 0 0 30px #00ffff;}
}

/* 🎮 Buttons */
.btn {
    margin-top: 25px;
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    background: #00aaff;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px #00aaff;
}

.btn:hover {
    transform: scale(1.1) translateY(-3px);
    box-shadow: 0 0 25px #00ffff;
}

/* ✨ floating particles */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="center">
    <div class="title">Kroxssy Network</div>
    <button class="btn">Sunucuya Gir</button>
    <button class="btn">Market</button>
</div>

<script>
// ✨ particle generator
for(let i=0;i<40;i++){
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (3 + Math.random()*5) + "s";
    p.style.opacity = Math.random();
    document.body.appendChild(p);
}
</script>

</body>
</html>
