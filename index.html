<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0b1220, #050816);
    color: white;
    overflow-x: hidden;
}

/* 🌌 background */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("assets/bg.png") center/cover;
    opacity: 0.2;
}

/* 🧊 layout */
.container {
    position: relative;
    padding: 40px;
    max-width: 1200px;
    margin: auto;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.logo {
    width: 90px;
    filter: drop-shadow(0 0 15px #00aaff);
}

/* LOGIN BOX */
.login {
    background: rgba(255,255,255,0.05);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
}

input {
    padding: 6px;
    margin: 3px;
    border-radius: 6px;
    border: none;
    outline: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 30px;
}

.title {
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 20px #00aaff;
}

/* IP */
.ip {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 30px;
}

.card {
    background: rgba(0,170,255,0.08);
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(0,170,255,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    background: rgba(0,170,255,0.2);
}

/* EXTRA PANELS */
.panel-big {
    margin-top: 30px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 18px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* STATUS */
.status {
    display: inline-block;
    padding: 6px 12px;
    background: #00ff88;
    color: black;
    border-radius: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="assets/logo.png" class="logo">

        <!-- 🔐 ACCOUNT UI -->
        <div class="login">
            <input placeholder="Kullanıcı">
            <input type="password" placeholder="Şifre">
            <button>Giriş</button>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <div class="title">Kroxssy Network</div>

        <div class="ip" onclick="copyIP()">
            🌐 gas-whale.gl.joinmc.link
        </div>

        <div style="margin-top:10px;">
            <span class="status">SUNUCU AKTİF</span>
        </div>
    </div>

    <!-- CARDS -->
    <div class="grid">

        <div class="card">📜 Kurallar</div>
        <div class="card">🛡 Yetkililer</div>
        <div class="card">🛒 Market</div>
        <div class="card">🌍 Sunucu</div>
        <div class="card">📊 Durum</div>
        <div class="card">⚔ MMORPG</div>

    </div>

    <!-- EXTRA DASHBOARD AREA -->
    <div class="panel-big">

        <!-- NEWS -->
        <div class="box">
            <h2>📢 Duyurular</h2>
            <p>- MMORPG sistemi geliştiriliyor</p>
            <p>- Yeni bosslar eklenecek</p>
            <p>- Guild savaşları geliyor</p>
        </div>

        <!-- PLAYER STATS -->
        <div class="box">
            <h2>👤 Hesap Paneli</h2>
            <p>Oyuncu: -</p>
            <p>Seviye: -</p>
            <p>Guild: -</p>
            <p>Coin: -</p>
        </div>

    </div>

</div>

<script>
function copyIP(){
    navigator.clipboard.writeText("gas-whale.gl.joinmc.link");
    alert("IP kopyalandı!");
}
</script>

</body>
</html>
