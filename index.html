<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0b1220, #050816);
    color: white;
}

/* 🌌 background */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,170,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(0,255,136,0.08), transparent 50%),
        url("assets/bg.png") center/cover;
    opacity: 0.22;
}

/* 🧊 container */
.container {
    position: relative;
    max-width: 1150px;
    margin: auto;
    padding: 40px 20px;
}

/* 🧭 NAVBAR */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
}

.logo {
    width: 85px;
    filter: drop-shadow(0 0 18px #00aaff);
}

/* NAV LINKS */
.navlinks {
    display: flex;
    gap: 18px;
}

.navlinks a {
    color: white;
    text-decoration: none;
    opacity: 0.7;
    transition: 0.2s;
}

.navlinks a:hover {
    opacity: 1;
    color: #00aaff;
}

/* 👤 ACCOUNT BOX */
.account {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    cursor: pointer;
}

.account img {
    width: 22px;
}

/* 🎯 HERO */
.hero {
    text-align: center;
    margin-top: 60px;
}

.title {
    font-size: 64px;
    font-weight: bold;
    text-shadow: 0 0 30px #00aaff;
}

.sub {
    opacity: 0.8;
    margin-top: 6px;
}

/* 🌐 IP */
.ip {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: 0.25s;
}

.ip:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00aaff;
}

/* STATUS */
.status {
    margin-top: 12px;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
    background: #00ff88;
    color: black;
    font-weight: bold;
}

/* 🎮 FEATURES */
.grid {
    margin-top: 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.card {
    background: rgba(0,170,255,0.08);
    border: 1px solid rgba(0,170,255,0.2);
    border-radius: 16px;
    padding: 18px;
    transition: 0.25s;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-8px);
    background: rgba(0,170,255,0.2);
}

/* 👤 ACCOUNT PANEL */
.account-panel {
    margin-top: 70px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

.box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(10px);
}

.box h2 {
    color: #00aaff;
    margin-top: 0;
}

/* input */
input {
    width: 90%;
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.4);
    color: white;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <!-- NAVBAR -->
    <div class="nav">

        <img src="assets/logo.png" class="logo">

        <div class="navlinks">
            <a href="#">Ana Sayfa</a>
            <a href="#">MMORPG</a>
            <a href="#">Market</a>
            <a href="#">Discord</a>
        </div>

        <!-- 👤 ACCOUNT ICON -->
        <div class="account">
            <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">
            <span>Hesap</span>
        </div>

    </div>

    <!-- HERO -->
    <div class="hero">

        <div class="title">Kroxssy Network</div>
        <div class="sub">Albion tarzı MMORPG & PvP Network</div>

        <div class="ip" onclick="copyIP()">
            🌐 gas-whale.gl.joinmc.link
        </div>

        <div>
            <span class="status">SUNUCU AKTİF</span>
        </div>

    </div>

    <!-- FEATURES -->
    <div class="grid">

        <div class="card">⚔ MMORPG Gear System</div>
        <div class="card">🧟 Custom Bosses</div>
        <div class="card">🌍 Risk Zones</div>
        <div class="card">💰 Economy System</div>
        <div class="card">🏰 Guild Wars</div>
        <div class="card">🎮 PvP Arena</div>

    </div>

    <!-- ACCOUNT SYSTEM -->
    <div class="account-panel">

        <div class="box">
            <h2>🔐 Giriş</h2>
            <input placeholder="Kullanıcı adı">
            <input type="password" placeholder="Şifre">
            <button>Giriş Yap</button>
        </div>

        <div class="box">
            <h2>👤 Hesap Bilgileri</h2>
            <p>Oyuncu: -</p>
            <p>Seviye: -</p>
            <p>Guild: -</p>
            <p>Coin: -</p>
        </div>

    </div>

</div>

<script>
function copyIP(){
    navigator.clipboard.writeText("gas-whale.gl.joinmc.link");
    alert("IP kopyalandı!");
}
</script>

</body>
</html>
