<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050814;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  position:fixed;
  width:100%;
  top:0;
  backdrop-filter:blur(10px);
}

.nav a{
  color:#aaa;
  margin-left:15px;
  text-decoration:none;
}

.nav a:hover{color:white}

/* HERO */
.hero{
  text-align:center;
  padding:200px 20px 80px;
}

.title{
  font-size:80px;
  color:#4df0ff;
  text-shadow:0 0 30px #4df0ff;
}

.subtitle{
  color:#bbb;
  margin-top:10px;
}

/* IP */
.ip{
  margin-top:25px;
  display:inline-block;
  padding:15px 25px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:10px;
  cursor:pointer;
}

/* BUTTONS */
.buttons{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 22px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  font-size:14px;
}

.statusBtn{
  background:#4df0ff;
  color:black;
}

.statusBtn:hover{
  transform:scale(1.05);
  background:#2dd4bf;
}

.copyBtn{
  background:#ff4d6d;
  color:white;
}

.copyBtn:hover{
  transform:scale(1.05);
  background:#ff1f3d;
}

/* GRID */
.grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:60px 20px;
}

.card{
  width:220px;
  padding:25px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  text-align:center;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:#666;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div>Kroxssy Network</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="server.html">Sunucu</a>
    <a href="rules.html">Kurallar</a>
    <a href="staff.html">Ekip</a>
    <a href="shop.html">Mağaza</a>
    <a href="status.html">Durum</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">

  <div class="title">Kroxssy Network</div>
  <div class="subtitle">Modern Minecraft Network Platformu</div>

  <!-- IP TEXT -->
  <div class="ip" onclick="copyIP()">
    IP: kroxssynw.eu.org
  </div>

  <!-- BUTTONS -->
  <div class="buttons">

    <button class="btn copyBtn" onclick="copyIP()">
      IP Kopyala
    </button>

    <button class="btn statusBtn" onclick="goStatus()">
      Sunucu Durumu
    </button>

  </div>

</div>

<!-- FEATURES -->
<div class="grid">

  <div class="card">⚔ PvP Sistemi</div>
  <div class="card">🌍 Survival</div>
  <div class="card">🛡 Klanlar</div>
  <div class="card">🎉 Eventler</div>

</div>

<footer>
© 2026 Kroxssy Network
</footer>

<script>
function copyIP(){
  navigator.clipboard.writeText("kroxssynw.eu.org");
  alert("IP kopyalandı!");
}

function goStatus(){
  window.location.href = "status.html";
}
</script>

</body>
</html>
