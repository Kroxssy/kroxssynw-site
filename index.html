<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #050816, #0a1a33, #0d0f2c, #120a2a);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 panel */
.panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    color: white;
}

.title {
    font-size: 52px;
    font-weight: bold;
    text-shadow: 0 0 20px #00aaff;
}

.ip-box {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
}

.status {
    margin-top: 10px;
    display: inline-block;
    padding: 5px 12px;
    border-radius: 50px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    font-size: 13px;
}

/* 🎨 cosmetics grid */
.grid {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.card {
    padding: 18px;
    border-radius: 14px;
    background: rgba(0,170,255,0.12);
    border: 1px solid rgba(0,170,255,0.25);
    cursor: pointer;
    transition: 0.25s;
    text-align: left;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00ccff;
    background: rgba(0,170,255,0.25);
}

.card h3 {
    margin: 0;
    font-size: 18px;
}

.card p {
    margin: 6px 0 0;
    font-size: 13px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="panel">

    <div class="title">Cosmetics Center</div>

    <div class="ip-box" onclick="copyIP()">
        🌐 IP: <span id="ip">kroxssynw.eu.org</span> 📋
    </div>

    <div class="status">ONLINE</div>

    <div class="grid">

        <div class="card">
            <h3>✨ Particles</h3>
            <p>Oyuncu etrafı efektleri</p>
        </div>

        <div class="card">
            <h3>💀 Kill Effects</h3>
            <p>Kill animasyon efektleri</p>
        </div>

        <div class="card">
            <h3>🏃 Trails</h3>
            <p>Yürüyüş iz efektleri</p>
        </div>

        <div class="card">
            <h3>😎 Emotes</h3>
            <p>Animasyonlu hareketler</p>
        </div>

    </div>

</div>

<script>

// 📋 copy IP
function copyIP(){
    const ip = document.getElementById("ip").innerText;
    navigator.clipboard.writeText(ip);
    alert("IP kopyalandı: " + ip);
}

</script>

</body>
</html>
