<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #050816, #0a1a33, #0d0f2c, #120a2a);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

/* 🌊 Background animation */
@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 Glass panel */
.panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 650px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    color: white;
}

/* 🏷️ Title */
.title {
    font-size: 52px;
    font-weight: bold;
    text-shadow: 0 0 20px #00aaff;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px #00aaff;}
    to {text-shadow: 0 0 30px #00ffff;}
}

/* 🌐 IP */
.ip {
    margin-top: 10px;
    font-size: 18px;
    color: #bcdcff;
}

/* 📊 status */
.status {
    margin-top: 10px;
    display: inline-block;
    padding: 5px 12px;
    border-radius: 50px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    font-size: 13px;
}

/* 🎮 buttons grid */
.grid {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

/* 🔘 button */
.btn {
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: rgba(0,170,255,0.15);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.25s;
    border: 1px solid rgba(0,170,255,0.3);
}

.btn:hover {
    transform: scale(1.05);
    background: rgba(0,170,255,0.35);
    box-shadow: 0 0 20px #00ccff;
}

/* 🎮 main action */
.main-btn {
    margin-top: 20px;
    padding: 16px 30px;
    border: none;
    border-radius: 12px;
    background: #00aaff;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #00aaff;
}

.main-btn:hover {
    transform: translateY(-3px) scale(1.08);
    box-shadow: 0 0 30px #00ffff;
}
</style>
</head>

<body>

<div class="panel">

    <div class="title">Kroxssy Network</div>

    <div class="ip">IP: kroxssynw.eu.org</div>
    <div class="status">ONLINE</div>

    <button class="main-btn">Sunucuya Gir</button>

    <div class="grid">
        <button class="btn">📜 Rules</button>
        <button class="btn">🛡️ Staff</button>
        <button class="btn">🛒 Shop</button>
        <button class="btn">🌍 Server</button>
        <button class="btn">📊 Status</button>
        <button class="btn">🎮 Lobby</button>
    </div>

</div>

</body>
</html>
