<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kroxssy Network</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1220, #050816);
}

/* 🧊 panel */
.panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 820px;
    padding: 40px;
    border-radius: 24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.10);
    text-align: center;
    color: white;
}

.title {
    font-size: 56px;
    font-weight: bold;
    text-shadow: 0 0 25px #00aaff;
}

/* 🌐 IP */
.ip {
    margin-top: 14px;
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
}

/* 📊 status */
.status {
    margin-top: 12px;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    font-size: 13px;
}

/* 🎮 grid */
.grid {
    margin-top: 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

/* 🔘 card */
.card {
    display: block;
    padding: 18px;
    border-radius: 16px;
    background: rgba(0,170,255,0.08);
    border: 1px solid rgba(0,170,255,0.20);
    text-decoration: none;
    color: white;
    transition: 0.25s;
    text-align: left;
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 0 25px rgba(0,170,255,0.4);
    background: rgba(0,170,255,0.18);
}

.card h3 {
    margin: 0;
    font-size: 18px;
}

.card p {
    margin: 6px 0 0;
    font-size: 13px;
    opacity: 0.75;
}
</style>
</head>

<body>

<div class="panel">

    <div class="title">Kroxssy Network</div>

    <div class="ip" onclick="copyIP()">
        🌐 kroxssynw.eu.org 📋
    </div>

    <div class="status">SUNUCU AKTİF</div>

    <div class="grid">

        <a class="card" href="rules.html">
            <h3>📜 Kurallar</h3>
            <p>Sunucu kurallarını görüntüle</p>
        </a>

        <a class="card" href="staff.html">
            <h3>🛡️ Yetkililer</h3>
            <p>Ekip ve yönetim kadrosu</p>
        </a>

        <a class="card" href="shop.html">
            <h3>🛒 Market</h3>
            <p>Özel ürünler ve paketler</p>
        </a>

        <a class="card" href="server.html">
            <h3>🌍 Sunucu</h3>
            <p>Modlar ve sunucu bilgisi</p>
        </a>

        <a class="card" href="satatus.html">
            <h3>📊 Durum</h3>
            <p>Online oyuncular ve status</p>
        </a>

    </div>

</div>

<script>
function copyIP(){
    navigator.clipboard.writeText("kroxssynw.eu.org");
    alert("IP kopyalandı!");
}
</script>

</body>
</html>
