<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sunucu Durumu - Kroxssy Network</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050814;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  position:fixed;
  width:100%;
  top:0;
  backdrop-filter:blur(10px);
}

.nav a{
  color:#aaa;
  margin-left:15px;
  text-decoration:none;
}

.nav a:hover{
  color:white;
}

/* CONTENT */
.container{
  padding:140px 20px;
  text-align:center;
}

.title{
  font-size:60px;
  color:#4df0ff;
  text-shadow:0 0 20px #4df0ff;
}

/* STATUS GRID */
.grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:40px;
}

.card{
  width:250px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:15px;
  padding:25px;
}

/* STATUS DOT */
.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
  margin-right:8px;
}

.online{
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

.offline{
  background:#ef4444;
  box-shadow:0 0 10px #ef4444;
}

/* INFO BOX */
.info{
  max-width:800px;
  margin:40px auto;
  background:#111827;
  padding:25px;
  border-radius:12px;
  border:1px solid #1f2937;
  line-height:1.6;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 20px;
  background:#4df0ff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  background:#2dd4bf;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div>Kroxssy Network</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="server.html">Sunucu</a>
    <a href="rules.html">Kurallar</a>
    <a href="staff.html">Ekip</a>
    <a href="shop.html">Mağaza</a>
    <a href="status.html">Durum</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="title">Sunucu Durumu</div>

  <div class="info">
    Buradan Kroxssy Network sunucusunun anlık durumunu takip edebilirsin.
    Sistem otomatik olarak bağlantı durumunu ve genel bilgileri gösterir.
  </div>

  <div class="grid">

    <div class="card">
      🟢 Durum<br>
      <span class="dot online"></span> ONLINE
    </div>

    <div class="card">
      👥 Oyuncular<br>
      0 / 200
    </div>

    <div class="card">
      ⚡ Ping<br>
      32ms
    </div>

    <div class="card">
      🌍 Versiyon<br>
      1.8 - 1.20+
    </div>

  </div>

  <button class="btn" onclick="refreshStatus()">
    Durumu Yenile
  </button>

</div>

<script>
function refreshStatus(){
  alert("Sunucu durumu güncellendi (demo)");
}
</script>

</body>
</html>
